<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NitroCellCtrl</title>
    <link rel="stylesheet" href="style.css" />
  </head>
<body>
  <h1>Nitro Cell Control</h1>
  <div class="main">
    <div class="controls">
      <button onclick="Uleft()">⇖</button>
      <button onclick="forward()">↑</button>
      <button onclick="Uright()">⇗</button>
      <button onclick="left()">←</button>
      <div></div>
      <button onclick="right()">→</button>
      <button onclick="Dleft()">⇙</button>
      <button onclick="backward()">↓</button>
      <button onclick="Dright()">⇘</button>
    </div>
    <div class="slider">
      <label for="myRange">Speed:</label>
      <input type="range" id="myRange" min="0" max="255" value="50">
    </div>
    <input type="number" id="number-input" min="0" max="255" value="50">
  <script src="script.js"></script>
  <element onchange="myScript">
</body>
</html>
